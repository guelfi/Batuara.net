name: CD - Deploy to OCI

on:
  # Only deploy after CI passes on master
  workflow_run:
    workflows: ["CI - Build & Validate"]
    branches: [master]
    types: [completed]
  workflow_dispatch:

# Prevent concurrent deployments
concurrency:
  group: deploy-oci
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded (or manual trigger)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H ${{ secrets.OCI_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to OCI server
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          SCP_CMD="scp -i ~/.ssh/oci_key -o StrictHostKeyChecking=no"
          SSH_CMD="ssh -i ~/.ssh/oci_key -o StrictHostKeyChecking=no ${OCI_USER}@${OCI_HOST}"

          # Upload deploy script
          $SCP_CMD scripts/ci/deploy-rolling.sh ${OCI_USER}@${OCI_HOST}:/tmp/deploy-rolling.sh

          # Write secrets to a temporary env file and upload it (safer than shell interpolation)
          TMPENV=$(mktemp)
          printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD" > "$TMPENV"
          printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> "$TMPENV"
          printf 'GITHUB_SHA=%s\n' "$GITHUB_SHA" >> "$TMPENV"
          $SCP_CMD "$TMPENV" ${OCI_USER}@${OCI_HOST}:/tmp/deploy-env
          rm -f "$TMPENV"

          # Execute deploy sourcing the env file
          $SSH_CMD "chmod +x /tmp/deploy-rolling.sh && \
            set -a && source /tmp/deploy-env && set +a && \
            /tmp/deploy-rolling.sh; \
            EXIT_CODE=\$?; rm -f /tmp/deploy-env /tmp/deploy-rolling.sh; exit \$EXIT_CODE"

      - name: Verify deployment
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/oci_key -o StrictHostKeyChecking=no ${OCI_USER}@${OCI_HOST}"

          echo "Waiting 60s for containers to stabilize..."
          sleep 60

          echo "=== Container Status ==="
          $SSH_CMD "docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -i batuara || echo 'No batuara containers found'"

          echo ""
          echo "=== Health Check ==="
          $SSH_CMD "curl -sf http://localhost:3003/health || echo 'API health check failed (may need more time)'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/oci_key
