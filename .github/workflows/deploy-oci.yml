name: CD - Deploy to OCI

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: 'Digite YES para confirmar o deploy na OCI'
        required: true
        default: ''
  workflow_run:
    workflows: ["CI - Build & Validate"]
    types:
      - completed

# Prevent concurrent deployments
concurrency:
  group: deploy-oci
  cancel-in-progress: false

jobs:
  validate:
    name: Validate deploy inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch and confirmation
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF}" != "refs/heads/master" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
              echo "::error::Deploy permitido apenas a partir do branch 'master' (ou 'main'). Branch atual: ${GITHUB_REF}"
              exit 1
            fi

            CONFIRM_RAW="${{ github.event.inputs.confirm_deploy }}"
            CONFIRM_CLEAN="$(echo "$CONFIRM_RAW" | tr -d '\r\n\t ' | tr '[:lower:]' '[:upper:]')"
            if [ "$CONFIRM_CLEAN" != "YES" ]; then
              echo "::error::Para executar o deploy, preencha confirm_deploy exatamente com YES."
              exit 1
            fi
          fi

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "::error::Deploy automático bloqueado: CI não está verde (conclusion=${{ github.event.workflow_run.conclusion }})."
              exit 1
            fi

            if [ "${{ github.event.workflow_run.head_branch }}" != "master" ] && [ "${{ github.event.workflow_run.head_branch }}" != "main" ]; then
              echo "::error::Deploy automático bloqueado: apenas merge/push em 'master' (ou 'main') dispara deploy (branch=${{ github.event.workflow_run.head_branch }})."
              exit 1
            fi
          fi

  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}

      - name: Add OCI host to known_hosts
        run: ssh-keyscan -H ${{ secrets.OCI_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Validate SSH connection
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no ${OCI_USER}@${OCI_HOST} "echo 'SSH connection OK'"

      - name: Deploy to OCI server
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          DEPLOY_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SCP_CMD="scp -o StrictHostKeyChecking=no"
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${OCI_USER}@${OCI_HOST}"

          # Upload deploy script
          $SCP_CMD scripts/ci/deploy-rolling.sh ${OCI_USER}@${OCI_HOST}:/tmp/deploy-rolling.sh

          # Write secrets to a temporary env file and upload it (safer than shell interpolation)
          TMPENV=$(mktemp)
          printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD" > "$TMPENV"
          printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> "$TMPENV"
          printf 'GITHUB_SHA=%s\n' "$DEPLOY_SHA" >> "$TMPENV"
          $SCP_CMD "$TMPENV" ${OCI_USER}@${OCI_HOST}:/tmp/deploy-env
          rm -f "$TMPENV"

          # Execute deploy sourcing the env file
          $SSH_CMD "chmod +x /tmp/deploy-rolling.sh && \
            set -a && source /tmp/deploy-env && set +a && \
            /tmp/deploy-rolling.sh; \
            EXIT_CODE=\$?; rm -f /tmp/deploy-env /tmp/deploy-rolling.sh; exit \$EXIT_CODE"

      - name: Verify deployment
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no ${OCI_USER}@${OCI_HOST}"

          echo "Waiting 60s for containers to stabilize..."
          sleep 60

          echo "=== Container Status ==="
          $SSH_CMD "docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -i batuara || echo 'No batuara containers found'"

          echo ""
          echo "=== Health Check ==="
          $SSH_CMD "curl -sf http://localhost:3003/health || echo 'API health check failed (may need more time)'"
          echo ""
          echo "=== Deployed Commit (server) ==="
          $SSH_CMD "cd /var/www/batuara_net/Batuara.net && git rev-parse HEAD && git log -1 --oneline"
          echo ""
          echo "=== PublicWebsite asset-manifest (container) ==="
          $SSH_CMD "docker exec batuara-net-public-website sh -lc \"test -f /usr/share/nginx/html/asset-manifest.json && (cat /usr/share/nginx/html/asset-manifest.json | head -n 40) || echo 'asset-manifest.json not found'\""
