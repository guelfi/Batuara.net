# ConfiguraĂ§ĂŁo isolada para Batuara.net
# Evita conflitos com outros projetos (MobileMed, etc.) na mesma OCI

services:
  publicwebsite:
    build:
      context: ../../
      dockerfile: Dockerfile.frontend
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:3003}
        - APP_PATH=src/Frontend/PublicWebsite
        - WEB_BASE_PATH=/batuara-public
    container_name: ${COMPOSE_PROJECT_NAME:-batuara-net}-public-website
    ports:
      - "${PUBLIC_WEBSITE_PORT:-3000}:80"
    networks:
      - batuara-network
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"
      - "service.type=frontend"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admindashboard:
    build:
      context: ../../
      dockerfile: Dockerfile.frontend
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-/batuara-api/api}
        - APP_PATH=src/Frontend/AdminDashboard
        - WEB_BASE_PATH=/batuara-admin
    container_name: ${COMPOSE_PROJECT_NAME:-batuara-net}-admin-dashboard
    ports:
      - "${ADMIN_DASHBOARD_PORT:-3001}:80"
    networks:
      - batuara-network
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"
      - "service.type=frontend"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API (opcional - descomente quando necessĂˇrio)
  api:
    build:
      context: ../../
      dockerfile: Dockerfile.api
    container_name: ${COMPOSE_PROJECT_NAME:-batuara-net}-api
    ports:
      - "${API_PORT:-3003}:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=${COMPOSE_PROJECT_NAME:-batuara-net}-db;Database=${DB_NAME:-batuara_db};Username=${PROJECT_NAME:-batuara}_user;Password=${DB_PASSWORD}
      - JwtSettings__Secret=${JWT_SECRET}
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=${ENVIRONMENT:-Production}
      - DB_APPLY_MIGRATIONS_ON_STARTUP=${DB_APPLY_MIGRATIONS_ON_STARTUP:-false}
      - DB_SEED_ON_STARTUP=${DB_SEED_ON_STARTUP:-false}
    networks:
      - batuara-network
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"
      - "service.type=backend"
    depends_on:
      - db
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Database (opcional - descomente quando necessĂˇrio)
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-batuara-net}-db
    environment:
      - POSTGRES_DB=${DB_NAME:-batuara_db}
      - POSTGRES_USER=${PROJECT_NAME:-batuara}_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - DB_RESTORE_ON_EMPTY=${DB_RESTORE_ON_EMPTY:-false}
      - DB_RESTORE_FILE=${DB_RESTORE_FILE:-}
      - DB_RESTORE_SCHEMA=${DB_RESTORE_SCHEMA:-batuara}
      - DB_RESTORE_MIN_TABLES=${DB_RESTORE_MIN_TABLES:-1}
      - DB_RESTORE_EXPECT_TABLES=${DB_RESTORE_EXPECT_TABLES:-}
    volumes:
      - batuara-db-data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - type: bind
        source: ./postgres-init/10-restore.sh
        target: /docker-entrypoint-initdb.d/10-restore.sh
        read_only: true
      - type: bind
        source: ../../database
        target: /docker-entrypoint-initdb.d/backup
        read_only: true
        bind:
          create_host_path: true
    networks:
      - batuara-network
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"
      - "service.type=database"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PROJECT_NAME:-batuara}_user -d ${DB_NAME:-batuara_db}" ]
      interval: 30s
      timeout: 10s
      retries: 5

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Rede isolada para evitar conflitos com outros projetos
  batuara-network:
    name: ${DOCKER_NETWORK:-batuara-network}
    driver: bridge
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"

volumes:
  # Volumes com prefixo para isolamento
  batuara-db-data:
    name: ${VOLUME_PREFIX:-batuara}-db-data-pg16
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"
