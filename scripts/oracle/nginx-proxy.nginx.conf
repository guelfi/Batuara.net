events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  resolver 127.0.0.11 ipv6=off valid=10s;

  log_format custom '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream: $upstream_addr';
  access_log /var/log/nginx/access.log custom;
  error_log /var/log/nginx/error.log warn;

  server {
    listen 80;
    server_name batuara.org.br www.batuara.org.br;

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name batuara.org.br www.batuara.org.br;

    ssl_certificate /etc/letsencrypt/live/batuara.org.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/batuara.org.br/privkey.pem;

    location ^~ /batuara-api/ {
      set $upstream_batuara_api http://batuara-net-api:8080;
      rewrite ^/batuara-api/(.*)$ /$1 break;
      proxy_pass $upstream_batuara_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
      set $upstream_batuara_api http://batuara-net-api:8080;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass $upstream_batuara_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /swagger/ {
      set $upstream_batuara_api http://batuara-net-api:8080;
      proxy_pass $upstream_batuara_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /admin/ {
      set $upstream_batuara_admin http://batuara-net-admin-dashboard:80;
      proxy_pass $upstream_batuara_admin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port 443;
      proxy_redirect http://www.batuara.org.br/admin/ https://www.batuara.org.br/admin/;
      proxy_redirect http://www.batuara.org.br/admin https://www.batuara.org.br/admin;
      proxy_redirect http://batuara.org.br/admin/ https://batuara.org.br/admin/;
      proxy_redirect http://batuara.org.br/admin https://batuara.org.br/admin;
      proxy_redirect http://$host/admin/ https://$host/admin/;
      proxy_redirect http://$host/admin https://$host/admin;
    }

    location / {
      set $upstream_batuara_public http://batuara-net-public-website:80;
      proxy_pass $upstream_batuara_public;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  server {
    listen 80;
    server_name _ 129.153.86.168;

    location /hako/ {
      set $upstream_hako http://hako-website:80;
      rewrite ^/hako/(.*)$ /$1 break;
      proxy_pass $upstream_hako;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthcore/ {
      set $upstream_healthcore_front http://healthcore-frontend:80;
      rewrite ^/healthcore/(.*)$ /$1 break;
      proxy_pass $upstream_healthcore_front;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthcore/swagger {
      proxy_pass http://healthcore-api:5000/swagger/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthcore/api/ {
      rewrite ^/healthcore/api/(.*)$ /api/$1 break;
      proxy_pass http://healthcore-api:5000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /barbear-ia/ {
      set $upstream_barbearia http://barbear-ia-frontend:80;
      rewrite ^/barbear-ia/(.*)$ /$1 break;
      proxy_pass $upstream_barbearia;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /driverhub/ {
      set $upstream_driverhub_front http://driverhub-frontend:80;
      rewrite ^/driverhub/(.*)$ /$1 break;
      proxy_pass $upstream_driverhub_front;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /driverhub-admin/ {
      set $upstream_driverhub_admin http://driverhub-dashboard:80;
      rewrite ^/driverhub-admin/(.*)$ /$1 break;
      proxy_pass $upstream_driverhub_admin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /driverhub/swagger {
      proxy_pass http://driverhub-api:8080/swagger/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /driverhub/api/ {
      rewrite ^/driverhub/api/(.*)$ /api/$1 break;
      proxy_pass http://driverhub-api:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /unisystem/ {
      set $upstream_unisystem_front http://unisystem-frontend:80;
      rewrite ^/unisystem/(.*)$ /$1 break;
      proxy_pass $upstream_unisystem_front;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /unisystem/swagger {
      proxy_pass http://unisystem-api:5050/swagger/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /unisystem/api/ {
      rewrite ^/unisystem/api/(.*)$ /api/$1 break;
      proxy_pass http://unisystem-api:5050;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
      return 200 'Nginx Proxy - OCI\n';
      add_header Content-Type text/plain;
    }
  }
}
