# Configuração de produção para Batuara.net
# Para usar: docker-compose -f docker-compose.production.yml up -d

services:
  publicwebsite:
    image: ghcr.io/guelfi/batuara.net-frontend:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-batuara-net}-public-website
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-/api}
    ports:
      - "${PUBLIC_WEBSITE_BIND_IP:-0.0.0.0}:${PUBLIC_WEBSITE_PORT:-3000}:80"
    networks:
      - batuara-network
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"
      - "service.type=frontend"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:80 > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admindashboard:
    image: ghcr.io/guelfi/batuara.net-admin:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-batuara-net}-admin-dashboard
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-/api}
    ports:
      - "${ADMIN_DASHBOARD_BIND_IP:-0.0.0.0}:${ADMIN_DASHBOARD_PORT:-3001}:80"
    networks:
      - batuara-network
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"
      - "service.type=frontend"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:80 > /dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - api

  api:
    image: ghcr.io/guelfi/batuara.net-api:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-batuara-net}-api
    ports:
      - "${API_BIND_IP:-0.0.0.0}:${API_PORT:-3003}:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=${COMPOSE_PROJECT_NAME:-batuara-net}-db;Database=${DB_NAME:-batuara_db};Username=${PROJECT_NAME:-batuara}_user;Password=${DB_PASSWORD}
      - JwtSettings__Secret=${JWT_SECRET}
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=${ENVIRONMENT:-Production}
      - DB_APPLY_MIGRATIONS_ON_STARTUP=${DB_APPLY_MIGRATIONS_ON_STARTUP:-false}
      - DB_SEED_ON_STARTUP=${DB_SEED_ON_STARTUP:-false}
      - WhatsApp__Provider=${WHATSAPP_PROVIDER:-EvolutionApi}
      - WhatsApp__Enabled=${WHATSAPP_ENABLED:-false}
      - WhatsApp__BaseUrl=${WHATSAPP_BASE_URL:-http://batuara-evolution-api:8080}
      - WhatsApp__ApiKey=${WHATSAPP_API_KEY:-}
      - WhatsApp__InstanceName=${WHATSAPP_INSTANCE_NAME:-batuara-casa}
      - WhatsApp__AllowedRecipients=${WHATSAPP_ALLOWED_RECIPIENTS:-}
      - ContributionReminders__Enabled=${CONTRIBUTION_REMINDERS_ENABLED:-false}
      - ContributionReminders__IntervalMinutes=${CONTRIBUTION_REMINDERS_INTERVAL_MINUTES:-15}
      - ContributionReminders__DaysBeforeDue=${CONTRIBUTION_REMINDERS_DAYS_BEFORE_DUE:-2}
      - ContributionReminders__MaxMessagesPerRun=${CONTRIBUTION_REMINDERS_MAX_MESSAGES_PER_RUN:-1}
      - ContributionReminders__RetryIntervalMinutes=${CONTRIBUTION_REMINDERS_RETRY_INTERVAL_MINUTES:-60}
      - ContributionReminders__MaxAttempts=${CONTRIBUTION_REMINDERS_MAX_ATTEMPTS:-3}
    networks:
      - batuara-network
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"
      - "service.type=backend"
    depends_on:
      - db
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-batuara-net}-db
    environment:
      - POSTGRES_DB=${DB_NAME:-batuara_db}
      - POSTGRES_USER=${PROJECT_NAME:-batuara}_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - DB_RESTORE_ON_EMPTY=${DB_RESTORE_ON_EMPTY:-false}
      - DB_RESTORE_FILE=${DB_RESTORE_FILE:-}
      - DB_RESTORE_SCHEMA=${DB_RESTORE_SCHEMA:-batuara}
      - DB_RESTORE_MIN_TABLES=${DB_RESTORE_MIN_TABLES:-1}
      - DB_RESTORE_EXPECT_TABLES=${DB_RESTORE_EXPECT_TABLES:-}
    volumes:
      - batuara-db-data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
      - type: bind
        source: ./scripts/docker/postgres-init/10-restore.sh
        target: /docker-entrypoint-initdb.d/10-restore.sh
        read_only: true
      - type: bind
        source: ./database
        target: /docker-entrypoint-initdb.d/backup
        read_only: true
        bind:
          create_host_path: true
    networks:
      - batuara-network
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"
      - "service.type=database"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PROJECT_NAME:-batuara}_user -d ${DB_NAME:-batuara_db}" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  batuara-network:
    name: ${DOCKER_NETWORK:-batuara-network}
    driver: bridge
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"

volumes:
  batuara-db-data:
    name: ${VOLUME_PREFIX:-batuara}-db-data-pg16
    labels:
      - "com.docker.compose.project=${COMPOSE_PROJECT_NAME:-batuara-net}"
      - "project.name=${PROJECT_NAME:-batuara}"
