title = "Batuara.net - Gitleaks Configuration"
description = "Allowlist for Batuara.net legitimate application data"

[allowlist]
description = "Batuara.net legitimate application data - not secrets"
paths = [
  '''\.agents/''',
  '''^database/''',
  '''\.env\.local\.example$''',
  '''results\.sarif$''',
  '''node_modules/''',
  '''^\.git/''',
  '''build/''',
  '''\.next/''',
  '''docs/''',
  '''\.md$'''
]

[[rules]]
id = "allow-all"
description = "Allow all content - Batuara.net legitimate data"
regex = '''.*'''
path = '''\.agents/'''
