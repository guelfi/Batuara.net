title = "Batuara.net - Gitleaks Configuration"

[extend]
useDefault = true

[[rules]]
id = "generic-secret"
description = "Disabled due to high false-positive rate for common application terms (token/password/etc.)"
regex = '''$^'''

[allowlist]
paths = [
  '''^\\.agents/''',
  '''^database/''',
  '''^\\.env\\.local\\.example$''',
  '''^results\\.sarif$'''
]
regexes = [
  '''^<TOKEN>$''',
  '''^<JWT_TOKEN>$''',
  '''^<REFRESH_TOKEN>$'''
]
